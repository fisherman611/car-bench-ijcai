# GHCR full test-set scenario for a published baseline LiteLLM agent image.
# Replace the agent_under_test image with your published image before running.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:-}", NVIDIA_NIM_API_KEY = "${NVIDIA_NIM_API_KEY:-}", NVIDIA_NIM_API_BASE = "${NVIDIA_NIM_API_BASE:-https://integrate.api.nvidia.com/v1}", USE_9ROUTER = "${USE_9ROUTER:-true}", NINE_ROUTER_API_BASE = "${NINE_ROUTER_API_BASE:-http://host.docker.internal:20128/v1}", NINE_ROUTER_API_KEY = "${NINE_ROUTER_API_KEY:-}", NINE_ROUTER_MODEL = "${NINE_ROUTER_MODEL:-nvidia/openai/gpt-oss-120b}", NINE_ROUTER_LITELLM_PROVIDER = "${NINE_ROUTER_LITELLM_PROVIDER:-nvidia_nim}", EVALUATOR_USER_MODEL = "${EVALUATOR_USER_MODEL:-nvidia/openai/gpt-oss-120b}", EVALUATOR_USER_PROVIDER = "${EVALUATOR_USER_PROVIDER:-nvidia_nim}", EVALUATOR_USER_THINKING = "${EVALUATOR_USER_THINKING:-false}", EVALUATOR_POLICY_EVALUATOR_MODEL = "${EVALUATOR_POLICY_EVALUATOR_MODEL:-nvidia/openai/gpt-oss-120b}", EVALUATOR_POLICY_EVALUATOR_PROVIDER = "${EVALUATOR_POLICY_EVALUATOR_PROVIDER:-nvidia_nim}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
image = "ghcr.io/yourusername/car-bench-track-1-agent-under-test:latest"
env = { ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", OPENAI_API_KEY = "${OPENAI_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:-}", NVIDIA_NIM_API_KEY = "${NVIDIA_NIM_API_KEY:-}", NVIDIA_NIM_API_BASE = "${NVIDIA_NIM_API_BASE:-https://integrate.api.nvidia.com/v1}", USE_9ROUTER = "${USE_9ROUTER:-true}", NINE_ROUTER_API_BASE = "${NINE_ROUTER_API_BASE:-http://host.docker.internal:20128/v1}", NINE_ROUTER_API_KEY = "${NINE_ROUTER_API_KEY:-}", NINE_ROUTER_MODEL = "${NINE_ROUTER_MODEL:-nvidia/openai/gpt-oss-120b}", NINE_ROUTER_LITELLM_PROVIDER = "${NINE_ROUTER_LITELLM_PROVIDER:-nvidia_nim}", AGENT_LLM = "${AGENT_LLM:-}", AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
user_model = "nvidia/openai/gpt-oss-120b"
user_provider = "nvidia_nim"
user_thinking = false
policy_evaluator_model = "nvidia/openai/gpt-oss-120b"
policy_evaluator_provider = "nvidia_nim"
