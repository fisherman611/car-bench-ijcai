# Local full test-set scenario for the baseline LiteLLM agent under test.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm nvidia_nim/nvidia/meta/llama-3.1-70b-instruct --temperature 0.0"

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
user_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
user_provider = "nvidia_nim"
user_thinking = false
policy_evaluator_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
policy_evaluator_provider = "nvidia_nim"
max_steps = 50



