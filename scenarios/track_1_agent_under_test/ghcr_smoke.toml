# GHCR smoke scenario for a published baseline LiteLLM agent image.
# Replace the agent_under_test image with your published image before running.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { NVIDIA_NIM_API_KEY = "${NVIDIA_NIM_API_KEY:-}", NVIDIA_NIM_API_BASE = "${NVIDIA_NIM_API_BASE:-https://integrate.api.nvidia.com/v1}", NINEROUTER_API_KEY = "${NINEROUTER_API_KEY:-}", NINEROUTER_API_BASE = "${NINEROUTER_API_BASE:-}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
image = "ghcr.io/yourusername/car-bench-track-1-agent-under-test:latest"
env = { ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", OPENAI_API_KEY = "${OPENAI_API_KEY:-}", NINEROUTER_API_KEY = "${NINEROUTER_API_KEY:-}", NINEROUTER_API_BASE = "${NINEROUTER_API_BASE:-}", NVIDIA_NIM_API_KEY = "${NVIDIA_NIM_API_KEY:-}", NVIDIA_NIM_API_BASE = "${NVIDIA_NIM_API_BASE:-https://integrate.api.nvidia.com/v1}", AGENT_LLM = "${AGENT_LLM:-nvidia_nim/nvidia/meta/llama-3.1-70b-instruct}", AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
user_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
user_provider = "nvidia_nim"
user_thinking = false
policy_evaluator_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
policy_evaluator_provider = "nvidia_nim"
max_steps = 50



