# Local smoke scenario for the baseline LiteLLM agent under test.
# Runs one train task from each CAR-bench task type.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm nvidia_nim/nvidia/meta/llama-3.1-70b-instruct --temperature 0.5"

[config]
num_trials = 1
task_split = "test"
tasks_hallucination_num_tasks = 3

user_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
user_provider = "nvidia_nim"
user_thinking = false
policy_evaluator_model = "nvidia_nim/nvidia/meta/llama-3.1-70b-instruct"
policy_evaluator_provider = "nvidia_nim"
max_steps = 50



